[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "robot-optimizer-core"
version = "0.1.0-dev"
description = "Core analysis engine for Robot Framework Optimizer"
readme = "README.md"
requires-python = ">=3.11"
license = {text = "MIT"}
dependencies = [
    "pydantic>=2.5.0",
    "pydantic-settings>=2.1.0",
    "robotframework>=6.0",
    "typing-extensions>=4.9.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.4.3",
    "pytest-cov>=4.1.0",
    "ruff>=0.1.8",
    "mypy>=1.7.1",
]

[tool.hatch.build]
packages = ["src/robot_optimizer_core"]
