[build-system]
requires = ["hatchling>=1.21.0"]
build-backend = "hatchling.build"

[project]
name = "robot-framework-optimizer-core"
version = "1.0.0"
description = "Core analysis engine for Robot Framework test suite optimization"
readme = "README.md"
requires-python = ">=3.11"
license = {text = "MIT"}
authors = [
    {name = "Robot Framework Optimizer Team", email = "team@rf-optimizer.com"}
]
keywords = [
    "robotframework",
    "testing",
    "automation",
    "analysis",
    "optimization",
    "quality"
]
classifiers = [
    "Development Status :: 4 - Beta",
    "Framework :: Robot Framework",
    "Framework :: Robot Framework :: Tool",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Operating System :: OS Independent",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Software Development :: Quality Assurance",
    "Topic :: Software Development :: Testing",
    "Typing :: Typed"
]

dependencies = [
    "pydantic>=2.5.0,<3.0.0",
    "pydantic-settings>=2.1.0,<3.0.0",
    "robotframework>=6.0,<8.0",
    "typing-extensions>=4.9.0",
]

[project.optional-dependencies]
dev = [
    # Testing
    "pytest>=7.4.3",
    "pytest-cov>=4.1.0",
    "pytest-asyncio>=0.21.1",
    "pytest-timeout>=2.2.0",
    "pytest-mock>=3.12.0",
    "mutmut>=2.4.3",
    
    # Code quality
    "ruff>=0.1.8",
    "mypy>=1.7.1",
    "black>=23.12.0",
    "isort>=5.13.0",
    "bandit[toml]>=1.7.5",
    
    # Documentation
    "mkdocs>=1.5.3",
    "mkdocs-material>=9.5.0",
    "mkdocstrings[python]>=0.24.0",
    "mkdocs-autorefs>=0.5.0",
    
    # Pre-commit
    "pre-commit>=3.5.0",
    
    # Performance testing
    "pytest-benchmark>=4.0.0",
    "memory-profiler>=0.61.0",
]

docs = [
    "mkdocs>=1.5.3",
    "mkdocs-material>=9.5.0",
    "mkdocstrings[python]>=0.24.0",
    "mkdocs-autorefs>=0.5.0",
    "mkdocs-coverage>=1.0.0",
    "mkdocs-git-revision-date-localized-plugin>=1.2.0",
]

[project.urls]
Homepage = "https://github.com/rf-optimizer/robot-framework-optimizer-core"
Documentation = "https://rf-optimizer.github.io/robot-framework-optimizer-core"
Repository = "https://github.com/rf-optimizer/robot-framework-optimizer-core"
Issues = "https://github.com/rf-optimizer/robot-framework-optimizer-core/issues"
Changelog = "https://github.com/rf-optimizer/robot-framework-optimizer-core/blob/main/CHANGELOG.md"

[tool.hatch.build]
packages = ["src/robot_optimizer_core"]

[tool.hatch.build.targets.wheel]
packages = ["src/robot_optimizer_core"]

[tool.hatch.build.targets.sdist]
include = [
    "/src",
    "/tests",
    "/docs",
    "README.md",
    "CHANGELOG.md",
    "LICENSE",
]

# Testing configuration
[tool.pytest.ini_options]
minversion = "7.0"
testpaths = ["tests"]
pythonpath = ["src"]
addopts = [
    "--strict-markers",
    "--tb=short",
    "--cov=robot_optimizer_core",
    "--cov-branch",
    "--cov-report=term-missing:skip-covered",
    "--cov-report=html:htmlcov",
    "--cov-report=xml:coverage.xml",
    "--cov-fail-under=99",
    "--asyncio-mode=auto",
]
markers = [
    "unit: Unit tests - fast and isolated",
    "integration: Integration tests - component interactions", 
    "component: Component tests - end-to-end workflows",
    "slow: Tests that take significant time",
    "performance: Performance benchmarks",
]
filterwarnings = [
    "error",
    "ignore::DeprecationWarning:robotframework.*",
]

# Coverage configuration
[tool.coverage.run]
source = ["src/robot_optimizer_core"]
branch = true
parallel = true
omit = [
    "*/tests/*",
    "*/__pycache__/*",
    "*/conftest.py",
]

[tool.coverage.report]
precision = 2
show_missing = true
skip_covered = false
fail_under = 99
exclude_lines = [
    # Standard pragmas
    "pragma: no cover",
    "if TYPE_CHECKING:",
    "if typing.TYPE_CHECKING:",
    "@overload",
    
    # Defensive programming
    "raise AssertionError",
    "raise NotImplementedError",
    "assert_never",
    
    # Abstract methods
    "@abstractmethod",
    "@abc.abstractmethod",
    
    # Platform specific
    "if sys.platform",
    
    # Debug only
    "if __name__ == .__main__.:",
    "def __repr__",
]

[tool.coverage.html]
directory = "htmlcov"

[tool.coverage.xml]
output = "coverage.xml"

# Ruff configuration (replaces flake8, isort, and more)
[tool.ruff]
target-version = "py311"
line-length = 88
fix = true

[tool.ruff.lint]
select = [
    "E",     # pycodestyle errors
    "W",     # pycodestyle warnings
    "F",     # pyflakes
    "I",     # isort
    "B",     # flake8-bugbear
    "C4",    # flake8-comprehensions
    "UP",    # pyupgrade
    "ARG",   # flake8-unused-arguments
    "SIM",   # flake8-simplify
    "TCH",   # flake8-type-checking
    "RUF",   # Ruff-specific rules
    "PTH",   # flake8-use-pathlib
    "FA",    # flake8-future-annotations
    "PIE",   # flake8-pie
    "RET",   # flake8-return
    "TD",    # flake8-todos
    "FIX",   # flake8-fixme
    "ERA",   # eradicate
    "PD",    # pandas-vet
    "PGH",   # pygrep-hooks
    "PL",    # pylint
    "TRY",   # tryceratops
    "FLY",   # flynt
    "PERF",  # Perflint
    "LOG",   # flake8-logging
]
ignore = [
    "E501",   # line too long - handled by black
    "PLR0913", # too many arguments
    "PLR2004", # magic values
]

[tool.ruff.lint.per-file-ignores]
"tests/*" = [
    "S101",   # assert used
    "ARG",    # unused arguments
    "FBT",    # boolean trap
    "PLR2004", # magic values
    "SIM300", # Yoda conditions
]
"conftest.py" = ["ARG"]

[tool.ruff.lint.isort]
known-first-party = ["robot_optimizer_core"]

[tool.ruff.lint.flake8-tidy-imports]
ban-relative-imports = "all"

[tool.ruff.lint.flake8-type-checking]
strict = true

# Mypy configuration
[tool.mypy]
python_version = "3.11"
strict = true
warn_return_any = true
warn_unused_configs = true
disallow_untyped_calls = true
disallow_untyped_defs = true
disallow_incomplete_defs = true
check_untyped_defs = true
disallow_untyped_decorators = true
no_implicit_optional = true
warn_redundant_casts = true
warn_unused_ignores = true
warn_no_return = true
warn_unreachable = true
strict_equality = true
pretty = true
show_error_codes = true
show_error_context = true
show_column_numbers = true

[[tool.mypy.overrides]]
module = [
    "robot.*",
    "robotframework.*",
]
ignore_missing_imports = true

# Black configuration
[tool.black]
line-length = 88
target-version = ['py311']
include = '\.pyi?$'
extend-exclude = '''
(
  /(
      \.eggs
    | \.git
    | \.hg
    | \.mypy_cache
    | \.tox
    | \.venv
    | _build
    | buck-out
    | build
    | dist
  )/
)
'''

# isort configuration (for compatibility if needed)
[tool.isort]
profile = "black"
line_length = 88
known_first_party = ["robot_optimizer_core"]
multi_line_output = 3
include_trailing_comma = true
force_grid_wrap = 0
use_parentheses = true
ensure_newline_before_comments = true

# Bandit configuration
[tool.bandit]
exclude_dirs = ["tests", "conftest.py"]
tests = ["B201", "B301"]
skips = ["B101", "B601"]

# Mutmut configuration
[tool.mutmut]
paths_to_mutate = "src/robot_optimizer_core"
tests_dir = "tests/unit"
runner = "pytest -x -q"
dict_synonyms = "Struct,NamedStruct"

# Documentation
[tool.mkdocs]
site_name = "Robot Framework Optimizer Core"
site_description = "Core analysis engine for Robot Framework test optimization"
site_author = "RF Optimizer Team"
site_url = "https://rf-optimizer.github.io/robot-framework-optimizer-core"
repo_url = "https://github.com/rf-optimizer/robot-framework-optimizer-core"
repo_name = "rf-optimizer/core"