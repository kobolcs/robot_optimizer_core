[tox]
envlist = py311,py312,py313,py314,lint,type,docs
isolated_build = true
skip_missing_interpreters = true

[testenv]
description = Run core tests with coverage
extras = test
commands =
    pytest {posargs:tests} \
        --cov=robot_optimizer_core \
        --cov-report=term-missing:skip-covered \
        --cov-report=html \
        --cov-report=xml

[testenv:lint]
description = Run meaningful lint checks (F, E, W, I, B, UP)
skip_install = true
deps =
    ruff>=0.7.0
commands =
    ruff check src tests --select F,E9,W,E,I,B,UP --ignore E501

[testenv:type]
description = Run type checking (strict, with deferred per-module ignores)
extras = dev
commands =
    mypy src/robot_optimizer_core

[testenv:docs]
description = Build documentation
extras = docs
commands =
    mkdocs build --clean --strict

[testenv:docs-serve]
description = Serve documentation locally
extras = docs
commands =
    mkdocs serve

[testenv:build]
description = Build distribution packages
skip_install = true
deps =
    build>=1.2.0
    twine>=5.1.0
commands =
    python ci/check_version.py
    python -m build
    twine check dist/*

[testenv:clean]
description = Clean up temporary files
skip_install = true
allowlist_externals = 
    rm
    find
commands =
    rm -rf build dist *.egg-info
    rm -rf htmlcov .coverage coverage.xml
    rm -rf .pytest_cache .mypy_cache .ruff_cache
    find . -type d -name __pycache__ -exec rm -rf {} +
    find . -type f -name "*.pyc" -delete