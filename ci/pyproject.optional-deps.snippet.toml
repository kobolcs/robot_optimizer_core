# Merge into pyproject.toml if you want optional API support.

[project.optional-dependencies]
api = [
  "fastapi>=0.115",
  "uvicorn>=0.30",
]

test = [
  "pytest>=8.0",
  "pytest-cov>=5.0",
  "httpx>=0.27",
]

lint = [
  "ruff>=0.6",
  "mypy>=1.11",
]

docs = [
  "mkdocs>=1.6",
  "mkdocs-material>=9.5",
  "mkdocstrings[python]>=0.26",
  "mkdocs-git-revision-date-localized-plugin>=1.2",
  "mkdocs-minify-plugin>=0.8",
]
