name: Publish

on:
  push:
    tags:
      - "v*.*.*"
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install tox
        run: python -m pip install --upgrade pip tox  # NOSONAR

      - name: Build distribution
        run: tox -e build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install tox
        run: python -m pip install --upgrade pip tox  # NOSONAR

      - name: Run tests
        run: tox -e py312

  publish-pypi:
    needs: [build, test]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    environment: pypi
    permissions:
      id-token: write
    steps:
      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  changelog:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Check if version section already exists in CHANGELOG.md
        id: check
        run: |
          if grep -qF "## [${{ steps.version.outputs.version }}]" CHANGELOG.md; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install git-cliff
        if: steps.check.outputs.exists == 'false'
        run: pip install git-cliff  # NOSONAR

      - name: Generate changelog section for ${{ github.ref_name }}
        if: steps.check.outputs.exists == 'false'
        run: |
          git-cliff --tag "${{ github.ref_name }}" --unreleased --prepend CHANGELOG.md

      - name: Commit updated CHANGELOG.md
        if: steps.check.outputs.exists == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          git commit -m "chore(release): update CHANGELOG.md for ${{ github.ref_name }}"
          git push origin HEAD:master

  publish-testpypi-dry-run:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.event_name == 'pull_request'
    steps:
      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install twine
        run: python -m pip install --upgrade pip twine  # NOSONAR

      - name: Validate package metadata for TestPyPI (dry-run)
        run: |
          python -m twine check dist/*
          echo "Dry-run complete. Publish target would be: https://test.pypi.org/project/robot-framework-optimizer-core/"
