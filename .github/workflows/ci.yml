name: CI
on:
  push:
    branches: [ master, main ]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ${{ matrix.os }}
    continue-on-error: ${{ matrix.experimental == true }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - python-version: "3.11"
            tox-env: "py311"
            os: ubuntu-latest
          - python-version: "3.12"
            tox-env: "py312"
            os: ubuntu-latest
          - python-version: "3.13"
            tox-env: "py313"
            os: ubuntu-latest
          - python-version: "3.14"
            tox-env: "py314"
            os: ubuntu-latest
            experimental: true
          - python-version: "3.11"
            tox-env: "py311"
            os: windows-latest
          - python-version: "3.12"
            tox-env: "py312"
            os: windows-latest
          - python-version: "3.13"
            tox-env: "py313"
            os: windows-latest
          - python-version: "3.14"
            tox-env: "py314"
            os: windows-latest
            experimental: true
          - python-version: "3.11"
            tox-env: "py311"
            os: macos-latest
          - python-version: "3.12"
            tox-env: "py312"
            os: macos-latest
          - python-version: "3.13"
            tox-env: "py313"
            os: macos-latest
          - python-version: "3.14"
            tox-env: "py314"
            os: macos-latest
            experimental: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          allow-prereleases: ${{ matrix.python-version == '3.14' }}
          cache: 'pip'

      - name: Cache tox environments
        uses: actions/cache@v4
        with:
          path: .tox
          key: tox-${{ matrix.os }}-${{ matrix.python-version }}-${{ hashFiles('tox.ini', 'pyproject.toml') }}
          restore-keys: |
            tox-${{ matrix.os }}-${{ matrix.python-version }}-

      - name: Install tox
        run: python -m pip install --upgrade pip tox  # NOSONAR

      - name: Run test matrix through tox
        run: tox -e ${{ matrix.tox-env }}

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.xml
          flags: ${{ matrix.os }}-py${{ matrix.python-version }}
          fail_ci_if_error: false

  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: 'pip'

      - name: Cache tox environments
        uses: actions/cache@v4
        with:
          path: .tox
          key: tox-quality-${{ hashFiles('tox.ini', 'pyproject.toml') }}
          restore-keys: |
            tox-quality-

      - name: Install tox
        run: python -m pip install --upgrade pip tox  # NOSONAR

      - name: Run lint / type / packaging / docs checks
        run: tox -e lint,type,build,docs

      - name: Audit dependencies
        run: |
          pip install --only-binary :all: pip-audit
          pip install -e .  # NOSONAR - local editable install, not a remote download
          pip-audit
