name: Feature Request
description: Suggest a new feature or improvement for robot-optimizer
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement! Please describe what you need and why it matters.

  - type: textarea
    id: problem
    attributes:
      label: Problem or motivation
      description: What problem are you trying to solve? What is the current limitation?
      placeholder: "I often have to manually check for X across my test suite, which takes..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Describe the feature or change you would like to see.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Have you considered any workarounds or alternative approaches?
    validations:
      required: false

  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Which part of the project does this relate to?
      options:
        - Analyzer (new or improved rule)
        - CLI
        - Python API
        - Reporting / output
        - Plugin system
        - Configuration
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Any other context, examples, or references.
    validations:
      required: false
